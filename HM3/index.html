<!DOCTYPE html>
<html>
<head>
    <title>HM3 : Employee Registration Form</title>
</head>
<body>

    <form action="">
        <table>
            <tr>
                <td colspan="2">
                    <img src="https://img.freepik.com/premium-vector/employee-icon_1134231-3528.jpg?w=2000" width='50' height='50'%3E%3Ccircle cx='25' cy='20' r='10' fill='%23f4a460'/%3E%3Crect x='15' y='30' width='20' height='20' fill='%234682b4'/%3E%3C/svg%3E" alt="icon" style="vertical-align: middle;">
                    <h1 style="color: red; font-family: serif; display: inline; margin-left: 10px;">Employee Registration Form</h1>
                </td>
            </tr>
            
            <tr>
                <td></td>
                <td>
                    <input type="radio" name="gender" checked> Mr.
                    <input type="radio" name="gender"> Mrs.
                    <input type="radio" name="gender"> Ms.
                </td>
            </tr>

            <tr>
                <td>First Name</td>
                <td><input type="text" placeholder="FirstName"></td>
            </tr>

            <tr>
                <td>Last Name</td>
                <td><input type="text" placeholder="LastName"></td>
            </tr>

            <tr>
                <td>Mail Address1</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>Mail Address2</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>City</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>State</td>
                <td>
                    <select>
                        <option>Gujarat</option>
                        <option>Maharashtra</option>
                        <option>Delhi</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Zip</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>Upload Photo</td>
                <td><input type="file"></td>
            </tr>

            <tr>
                <td>E-Mail</td>
                <td><input type="email"></td>
            </tr>

            <tr>
                <td>Mobile</td>
                <td><input type="text" value="+91"></td>
            </tr>

            <tr>
                <td>Languages known</td>
                <td>
                    <input type="checkbox" checked> Gujarati<br>
                    <input type="checkbox" checked> Hindi<br>
                    <input type="checkbox" checked> English<br>
                    <input type="checkbox"> Marathi
                </td>
            </tr>

            <tr>
                <td>Additional Information</td>
                <td><textarea rows="4" cols="30" placeholder="Optional"></textarea></td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="submit">
                    <input type="reset" value="reset">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
