<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .logo { 
            width: 70px; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0 auto 15px;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    
    <div class="card p-4" style="width: 350px; border: 1px solid #94cfe8;">
        <div class="logo">
            <img src="https://images.seeklogo.com/logo-png/27/1/bootstrap-logo-png_seeklogo-272883.png" alt="logo" style=" width: 70px; height: 70px; ">
        </div>
        <h5 class="text-center mb-3">Please sign in</h5>
        
        <form>
            <input type="email" class="form-control mb-2" placeholder="Email address" autofocus>
            <input type="password" class="form-control mb-2" placeholder="Password">
            
            <div class="form-check mb-3 d-flex justify-content-center p-2">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-2">Sign in</button>
        </form>
        
        <p class="text-center text-muted small mb-0">© 2017-2020</p>
    </div>

</body>
</html>
